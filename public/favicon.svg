<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="8" fill="#2C3E38"/>

  <!-- Roof -->
  <polyline
    points="16,28 32,12 48,28"
    fill="none"
    stroke="#C4A96B"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Left wall -->
  <line x1="16" y1="28" x2="16" y2="40" stroke="#C4A96B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right wall -->
  <line x1="48" y1="28" x2="48" y2="40" stroke="#C4A96B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ridge line -->
  <line x1="32" y1="18" x2="32" y2="28" stroke="#C4A96B" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Door -->
  <rect x="27" y="33" width="10" height="7" rx="1"
        fill="none" stroke="#C4A96B" stroke-width="1.8" opacity="0.85"/>

  <!-- Wave 1 -->
  <path
    d="M 8,46 Q 20,40 32,46 Q 44,52 56,46"
    fill="none"
    stroke="#C4A96B"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- Wave 2 -->
  <path
    d="M 6,52 Q 18,46 30,52 Q 42,58 54,52"
    fill="none"
    stroke="#C4A96B"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.4"
  />
</svg>
